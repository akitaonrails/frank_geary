name: AUR packaging

on:
  push:
    paths:
      - 'packaging/aur/**'
      - '.github/workflows/aur.yml'
  pull_request:
    paths:
      - 'packaging/aur/**'
      - '.github/workflows/aur.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push ready PKGBUILD/.SRCINFO files to AUR repositories'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']
      publish_binary:
        description: 'Also publish frank-geary-bin if its release asset/checksum are ready'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

concurrency:
  group: aur-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate AUR recipes
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix:
        package: [frank-geary, frank-geary-bin]
    steps:
      - name: Prepare Arch container
        run: |
          pacman -Syu --noconfirm git namcap openssh sudo
          useradd -m builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' >/etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder

      - name: Checkout
        uses: actions/checkout@v4

      - name: Allow non-root makepkg writes
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Validate .SRCINFO is current
        working-directory: packaging/aur/${{ matrix.package }}
        run: |
          sudo -u builder makepkg --printsrcinfo > .SRCINFO.generated
          diff -u .SRCINFO .SRCINFO.generated

      - name: Verify sources
        working-directory: packaging/aur/${{ matrix.package }}
        run: |
          if grep -q "sha256sums=('SKIP')" PKGBUILD; then
            printf 'Skipping source verification while release checksum placeholder is present.\n'
            exit 0
          fi
          sudo -u builder makepkg --verifysource --noconfirm

      - name: Run namcap on PKGBUILD
        working-directory: packaging/aur/${{ matrix.package }}
        run: namcap PKGBUILD

      - name: Best-effort package build
        if: ${{ false }}
        working-directory: packaging/aur/${{ matrix.package }}
        run: sudo -u builder makepkg --syncdeps --noconfirm --cleanbuild
        # Intentionally gated off: this legacy Geary-derived tree depends on
        # old WebKitGTK/GMime compatibility packages that may not exist in a
        # current Arch container. Enable after dependencies are modernized or
        # pinned compatibility packages are available.

  publish-source:
    name: Publish source package to AUR
    needs: validate
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    if: >-
      ${{
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
      }}
    steps:
      - name: Prepare Arch container
        run: pacman -Syu --noconfirm git openssh sudo

      - name: Checkout
        uses: actions/checkout@v4

      - name: Refuse placeholder source package metadata
        run: |
          if grep -q "sha256sums=('SKIP')" packaging/aur/frank-geary/PKGBUILD; then
            printf 'Source AUR publishing is blocked until the source checksum replaces SKIP.\n' >&2
            exit 1
          fi
          if grep -q "Release-time TODO" packaging/aur/frank-geary/PKGBUILD; then
            printf 'Source AUR publishing is blocked while source release-time TODOs remain.\n' >&2
            exit 1
          fi
          source_tag=$(sed -n "s/^_tag='\(.*\)'$/\1/p" packaging/aur/frank-geary/PKGBUILD)
          if test "${GITHUB_EVENT_NAME}" = "release" && test "${source_tag}" != "${GITHUB_REF_NAME}"; then
            printf 'AUR publishing is blocked: release ref %s does not match PKGBUILD _tag %s.\n' "${GITHUB_REF_NAME}" "${source_tag}" >&2
            exit 1
          fi

      - name: Configure AUR SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          test -n "${AUR_SSH_KEY}"
          install -d -m 0700 /tmp/aur-ssh
          printf '%s\n' "${AUR_SSH_KEY}" > /tmp/aur-ssh/aur
          chmod 0600 /tmp/aur-ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > /tmp/aur-ssh/known_hosts.new
          ssh-keygen -lf /tmp/aur-ssh/known_hosts.new | grep -F 'SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4'
          mv /tmp/aur-ssh/known_hosts.new /tmp/aur-ssh/known_hosts
          chmod 0644 /tmp/aur-ssh/known_hosts
          cat > /tmp/aur-ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile /tmp/aur-ssh/aur
            IdentitiesOnly yes
            UserKnownHostsFile /tmp/aur-ssh/known_hosts
            StrictHostKeyChecking yes
          EOF
          chmod 0600 /tmp/aur-ssh/config

      - name: Push source package
        run: |
          export GIT_SSH_COMMAND="ssh -F /tmp/aur-ssh/config -o UserKnownHostsFile=/tmp/aur-ssh/known_hosts"
          git clone ssh://aur@aur.archlinux.org/frank-geary.git /tmp/frank-geary-aur
          cp packaging/aur/frank-geary/PKGBUILD packaging/aur/frank-geary/.SRCINFO /tmp/frank-geary-aur/
          cd /tmp/frank-geary-aur
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && exit 0
          git -c user.name='FrankGeary CI' -c user.email='ci@users.noreply.github.com' commit -m 'Update frank-geary package'
          git push origin master

  publish-binary:
    name: Publish binary package to AUR
    needs: validate
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    if: >-
      ${{
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish == 'true' && inputs.publish_binary == 'true')
      }}
    steps:
      - name: Prepare Arch container
        run: pacman -Syu --noconfirm git openssh sudo

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check binary package readiness
        id: binary_ready
        run: |
          if grep -q "sha256sums=('SKIP')" packaging/aur/frank-geary-bin/PKGBUILD; then
            printf 'frank-geary-bin is not ready: release checksum is still SKIP. Skipping binary AUR publish.\n'
            printf 'ready=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if grep -q "Release-time TODO" packaging/aur/frank-geary-bin/PKGBUILD; then
            printf 'frank-geary-bin is not ready: release-time TODOs remain. Skipping binary AUR publish.\n'
            printf 'ready=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bin_tag=$(sed -n "s/^_tag='\(.*\)'$/\1/p" packaging/aur/frank-geary-bin/PKGBUILD)
          if test "${GITHUB_EVENT_NAME}" = "release" && test "${bin_tag}" != "${GITHUB_REF_NAME}"; then
            printf 'frank-geary-bin is not ready: release ref %s does not match PKGBUILD _tag %s.\n' "${GITHUB_REF_NAME}" "${bin_tag}"
            printf 'ready=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'ready=true\n' >> "$GITHUB_OUTPUT"

      - name: Configure AUR SSH
        if: steps.binary_ready.outputs.ready == 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          test -n "${AUR_SSH_KEY}"
          install -d -m 0700 /tmp/aur-ssh
          printf '%s\n' "${AUR_SSH_KEY}" > /tmp/aur-ssh/aur
          chmod 0600 /tmp/aur-ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > /tmp/aur-ssh/known_hosts.new
          ssh-keygen -lf /tmp/aur-ssh/known_hosts.new | grep -F 'SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4'
          mv /tmp/aur-ssh/known_hosts.new /tmp/aur-ssh/known_hosts
          chmod 0644 /tmp/aur-ssh/known_hosts
          cat > /tmp/aur-ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile /tmp/aur-ssh/aur
            IdentitiesOnly yes
            UserKnownHostsFile /tmp/aur-ssh/known_hosts
            StrictHostKeyChecking yes
          EOF
          chmod 0600 /tmp/aur-ssh/config

      - name: Push binary package
        if: steps.binary_ready.outputs.ready == 'true'
        run: |
          export GIT_SSH_COMMAND="ssh -F /tmp/aur-ssh/config -o UserKnownHostsFile=/tmp/aur-ssh/known_hosts"
          git clone ssh://aur@aur.archlinux.org/frank-geary-bin.git /tmp/frank-geary-bin-aur
          cp packaging/aur/frank-geary-bin/PKGBUILD packaging/aur/frank-geary-bin/.SRCINFO /tmp/frank-geary-bin-aur/
          cd /tmp/frank-geary-bin-aur
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && exit 0
          git -c user.name='FrankGeary CI' -c user.email='ci@users.noreply.github.com' commit -m 'Update frank-geary-bin package'
          git push origin master
